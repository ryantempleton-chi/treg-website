<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Open House Sign-In | Templeton Real Estate Group</title>
    <meta
      name="description"
      content="Open house sign-in for Templeton Real Estate Group. Share a few quick details so we can follow up and help with your home search."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@600;700&family=Oswald:wght@400;500&family=PT+Serif:wght@400;700&family=Roboto:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Global Styles -->
    <link rel="stylesheet" href="/assets/css/style.css" />
    <link rel="stylesheet" href="/assets/css/intake.css" />

    <style>
      .hero-subtitle {
        max-width: 760px;
      }

      .intake-form {
        padding-top: 24px;
      }

      .intake-form .container {
        max-width: 1040px;
      }

      .intake-card {
        overflow: hidden;
        border-radius: 24px;
      }

      .intake-card iframe {
        display: block;
        width: 100%;
        min-width: 100%;
        max-width: 100%;
        border: 0;
      }

      .open-house-note {
        max-width: 760px;
        margin: 18px auto 0;
        padding: 0 16px;
        text-align: center;
        font-family: "PT Serif", serif;
        font-size: 0.98rem;
        line-height: 1.7;
        color: var(--treg-slate, #373a3a);
      }

      @media (max-width: 1024px) {
        .intake-form {
          padding-top: 20px;
        }
      }

      @media (max-width: 768px) {
        .hero {
          padding-top: 42px;
          padding-bottom: 34px;
        }

        .hero-inner {
          padding-left: 20px;
          padding-right: 20px;
        }

        .hero-label {
          margin-bottom: 10px;
        }

        .hero-title {
          max-width: none;
          font-size: clamp(2.2rem, 8vw, 3.1rem);
          line-height: 0.96;
          letter-spacing: -0.02em;
          margin-bottom: 12px;
        }

        .hero-subtitle {
          max-width: 34ch;
          font-size: 1rem;
          line-height: 1.6;
        }

        .intake-form {
          padding-top: 14px;
          padding-bottom: 20px;
        }

        .intake-form .container {
          padding-left: 14px;
          padding-right: 14px;
        }

        .intake-card {
          border-radius: 18px;
        }

        .open-house-note {
          margin-top: 16px;
          padding: 0 8px;
          font-size: 0.96rem;
          line-height: 1.65;
        }
      }

      @media (max-width: 480px) {
        .hero {
          padding-top: 34px;
          padding-bottom: 28px;
        }

        .hero-inner {
          padding-left: 16px;
          padding-right: 16px;
        }

        .hero-label {
          font-size: 0.72rem;
          letter-spacing: 0.18em;
        }

        .hero-title {
          font-size: clamp(2rem, 10vw, 2.7rem);
          line-height: 0.98;
          margin-bottom: 10px;
        }

        .hero-subtitle {
          max-width: 30ch;
          font-size: 0.98rem;
          line-height: 1.55;
        }

        .intake-form {
          padding-top: 10px;
          padding-bottom: 16px;
        }

        .intake-form .container {
          padding-left: 10px;
          padding-right: 10px;
        }

        .intake-card {
          border-radius: 16px;
        }

        .open-house-note {
          margin-top: 14px;
          font-size: 0.93rem;
          line-height: 1.6;
        }
      }
    </style>
  </head>

  <body>
    <div class="page">
      <!-- Header -->
      <div id="site-header"></div>

      <main class="main">
        <!-- HERO -->
        <section class="hero">
          <div class="hero-inner">
            <div class="hero-label">glad you made it</div>
            <h1 class="hero-title">thanks for stopping by.</h1>
            <p class="hero-subtitle">
              Sign in below and we’ll be here if you’d like more information on this home or similar properties.
            </p>
          </div>
        </section>

        <!-- FORM -->
        <section class="intake-form">
          <div class="container">
            <div class="intake-card">
              <iframe
                id="JotFormIFrame-260975721911158"
                title="Open House Sign-In"
                onload="window.parent.scrollTo(0,0)"
                allowtransparency="true"
                allow="geolocation; microphone; camera; fullscreen; payment"
                src="https://form.jotform.com/260975721911158"
                frameborder="0"
                scrolling="no"
              ></iframe>

              <script src="https://cdn.jotfor.ms/s/umd/latest/for-form-embed-handler.js"></script>
              <script>
                window.jotformEmbedHandler(
                  "iframe[id='JotFormIFrame-260975721911158']",
                  "https://form.jotform.com/"
                );
              </script>
            </div>

            <p class="open-house-note">
              If you have any questions while you’re here, feel free to ask — we’re happy to help.
            </p>
          </div>
        </section>
      </main>

      <!-- Footer -->
      <div id="site-footer"></div>
    </div>

    <!-- Header/Footer Loader -->
    <script src="/assets/js/layout.js"></script>
  </body>
</html>
